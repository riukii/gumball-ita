<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="Gumball.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="Gumball.png">
    <title>Gumball</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --fs-width: 60px;           /* fullscreen button width (also 1× unit) */
            --bottom-offset: 12px;      /* distance from bottom for bottom controls */
            --right-offset: 12px;       /* distance from right for fullscreen btn */
            --next-right: 12px;        /* next button distance from right edge */
        }

        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh; width: 100vw;
        }

        /* ===== LOADING SCREEN ===== */
        .loading-screen {
            position: fixed; inset: 0; z-index: 400;
            background: linear-gradient(135deg, #0d1117, #161b22);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
        }
        .loading-screen.hidden { display: none; }

        .spinner {
            width: 56px; height: 56px;
            border: 3px solid rgba(79,195,247,0.2); border-top-color: #4fc3f7;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-title { font-size: clamp(16px, 2.5vw, 20px); font-weight: 600; color: #e0e0e0; }
        .loading-subtitle { font-size: clamp(12px, 2vw, 14px); color: #78909c; text-align: center; max-width: 320px; line-height: 1.6; }

        .loading-retry-btn {
            margin-top: 8px; padding: clamp(8px, 1.5vw, 10px) clamp(16px, 3vw, 24px); border: none; border-radius: 10px;
            background: linear-gradient(135deg, #4fc3f7, #7c4dff);
            color: #fff; font-size: clamp(12px, 1.8vw, 14px); font-weight: 600; cursor: pointer;
            transition: transform 0.2s;
        }
        .loading-retry-btn:hover { transform: scale(1.05); }

        /* ===== PLAYER ===== */
        .player-wrapper {
            position: relative; width: 100%;
            height: 100vh; height: 100dvh;
            background: #000;
        }
        html.is-fullscreen .player-wrapper { height: 100dvh !important; }
        .player-wrapper iframe { width: 100%; height: 100%; border: none; }

        /* ===== MOBILE BOTTOM SPACER (only for touch devices) ===== */
        .mobile-bottom-spacer { display: none; height: 0; width: 100%; transition: height 0.2s ease; }
        html.is-fullscreen .mobile-bottom-spacer { height: 0 !important; }

        /* ===== TRIGGER — full-screen transparent overlay that captures first mouse/touch ===== */
        /* When overlay is hidden, trigger-full is active (pointer-events: auto) and captures
           mouseenter/touchstart to show the overlay. When overlay is visible, trigger-full gets
           pointer-events: none so user can interact with the player underneath. */
        .trigger-full { display: block; position: fixed; inset: 0; z-index: 84; background: transparent; pointer-events: auto; }
        .trigger-full.disabled { pointer-events: none; }

        /* ===== FULLSCREEN OVERLAY BUTTON ===== */
        .fs-overlay-btn {
            position: fixed;
            top: calc(100% - var(--fs-width));
            right: 0;
            width: calc(var(--fs-width) + var(--right-offset));
            height: calc(var(--fs-width) + 20px);
            z-index: 95; cursor: pointer; background: transparent; border: none;
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
        }
        .fs-overlay-btn svg { width: 0; height: 0; fill: transparent; pointer-events: none; }

        /* ===== NEXT OVERLAY BUTTON ===== */
        .next-overlay-btn {
            position: fixed;
            bottom: calc(var(--fs-width) + var(--bottom-offset) + 8px);
            right: var(--next-right);
            z-index: 95; cursor: pointer;
            display: flex; align-items: center; gap: clamp(4px, 1vw, 8px);
            padding: clamp(7px, 1.2vw, 10px) clamp(10px, 2vw, 20px);
            border: none; border-radius: clamp(6px, 1.2vw, 10px);
            background: linear-gradient(135deg, #4fc3f7, #7c4dff); color: #fff;
            font-size: clamp(12px, 1.8vw, 14px); font-weight: 600;
            transition: all 0.2s ease, opacity 0.4s ease; white-space: nowrap;
        }
        .next-overlay-btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(79,195,247,0.3); }
        .next-overlay-btn:active { transform: scale(0.98); }
        .next-overlay-btn svg { width: clamp(14px, 2vw, 18px); height: clamp(14px, 2vw, 18px); fill: currentColor; }
        .next-overlay-btn.hidden { opacity: 0; pointer-events: none; }

        /* ===== TOP BAR ===== */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: clamp(10px, 2.5vw, 18px) clamp(12px, 3vw, 28px);
            background: linear-gradient(to bottom, rgba(0,0,0,0.92), rgba(0,0,0,0.6) 55%, transparent);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .top-bar.hidden { opacity: 0; transform: translateY(-20px); pointer-events: none; }

        .show-info { display: flex; align-items: center; gap: clamp(8px, 2vw, 18px); min-width: 0; flex: 1; }
        .show-logo { height: clamp(32px, 7vw, 56px); width: auto; max-width: 120px; object-fit: contain; border-radius: clamp(8px, 1.5vw, 14px); flex-shrink: 0; }
        .show-details { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
        .show-name { font-size: clamp(14px, 2.8vw, 22px); font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .episode-title { font-size: clamp(11px, 2vw, 16px); font-weight: 500; color: #58B8CD; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .episode-title .ep-separator { color: #607d8b; margin: 0 5px; }
        .episode-title .ep-season-info { font-style: italic; color: #b0bec5; }

        .controls { display: flex; align-items: center; gap: clamp(6px, 1vw, 10px); flex-shrink: 0; margin-left: clamp(8px, 2vw, 16px); }
        .btn {
            display: flex; align-items: center; gap: clamp(4px, 1vw, 8px);
            padding: clamp(6px, 1.2vw, 10px) clamp(8px, 2vw, 20px);
            border: none; border-radius: clamp(6px, 1.2vw, 10px);
            font-size: clamp(12px, 1.8vw, 14px); font-weight: 600; cursor: pointer;
            transition: all 0.2s ease; white-space: nowrap;
        }
        .btn-primary { background: linear-gradient(135deg, #4fc3f7, #7c4dff); color: #fff; }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(79,195,247,0.3); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-secondary { background: rgba(255,255,255,0.14); color: #e0e0e0; }
        .btn-secondary:hover { background: rgba(255,255,255,0.22); }
        .btn svg { width: clamp(14px, 2vw, 18px); height: clamp(14px, 2vw, 18px); fill: currentColor; }

        /* ===== TRANSITION OVERLAY ===== */
        .transition-overlay {
            position: fixed; inset: 0; z-index: 200; background: #0a0a0f;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .transition-overlay.active { opacity: 1; pointer-events: all; }
        .transition-overlay .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(79,195,247,0.2); border-top-color: #4fc3f7;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        .loading-text { font-size: 16px; color: #9e9e9e; font-weight: 500; }

        /* ===== SETTINGS PANEL ===== */
        .settings-panel {
            position: fixed; top: 0; right: 0; z-index: 300;
            width: 360px; max-width: 90vw; height: 100vh;
            background: rgba(13, 17, 23, 0.97);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(79,195,247,0.15);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            overflow-y: auto;
            padding: 24px 20px;
        }
        .settings-panel.open { transform: translateX(0); }

        .settings-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .settings-header h2 { font-size: 18px; font-weight: 700; color: #e0e0e0; }
        .settings-close { background: none; border: none; color: #78909c; font-size: 24px; cursor: pointer; padding: 4px 8px; line-height: 1; }
        .settings-close:hover { color: #fff; }

        .settings-section { margin-bottom: 20px; }
        .settings-section-title {
            font-size: 13px; font-weight: 600; color: #4fc3f7;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 12px; padding-bottom: 6px;
            border-bottom: 1px solid rgba(79,195,247,0.15);
        }

        .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .toggle-label { font-size: 14px; color: #e0e0e0; }
        .toggle-label small { display: block; font-size: 11px; color: #78909c; margin-top: 2px; }

        .toggle-switch {
            position: relative; width: 44px; height: 24px;
            background: rgba(255,255,255,0.12); border-radius: 12px;
            cursor: pointer; transition: background 0.2s; flex-shrink: 0;
        }
        .toggle-switch.active { background: rgba(79,195,247,0.5); }
        .toggle-switch::after {
            content: ''; position: absolute;
            top: 3px; left: 3px; width: 18px; height: 18px;
            background: #e0e0e0; border-radius: 50%;
            transition: transform 0.2s, background 0.2s;
        }
        .toggle-switch.active::after { transform: translateX(20px); background: #4fc3f7; }

        .settings-backdrop {
            position: fixed; inset: 0; z-index: 299;
            background: rgba(0,0,0,0.5);
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .settings-backdrop.open { opacity: 1; pointer-events: all; }

        /* ===== EPISODE LIST ===== */
        .ep-list-show { margin-bottom: 16px; }
        .ep-list-show-name {
            font-size: 14px; font-weight: 700; color: #e0e0e0;
            padding: 8px 0 4px; border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .ep-list-season-header {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 8px; cursor: pointer;
            border-radius: 8px; transition: background 0.15s;
            user-select: none;
        }
        .ep-list-season-header:hover { background: rgba(255,255,255,0.06); }
        .ep-list-season-header .arrow {
            display: inline-block; font-size: 10px; color: #4fc3f7;
            transition: transform 0.2s; width: 16px; text-align: center;
        }
        .ep-list-season-header .arrow.open { transform: rotate(90deg); }
        .ep-list-season-header .season-label { font-size: 13px; font-weight: 600; color: #b0bec5; }
        .ep-list-season-header .season-count { font-size: 11px; color: #546e7a; margin-left: auto; }
        .ep-list-season-header .season-toggle {
            width: 32px; height: 18px; border-radius: 9px;
            background: rgba(255,255,255,0.12); position: relative;
            transition: background 0.2s; flex-shrink: 0; margin-left: 6px;
        }
        .ep-list-season-header .season-toggle.active { background: rgba(79,195,247,0.5); }
        .ep-list-season-header .season-toggle::after {
            content: ''; position: absolute;
            top: 2px; left: 2px; width: 14px; height: 14px;
            background: #b0bec5; border-radius: 50%;
            transition: transform 0.2s, background 0.2s;
        }
        .ep-list-season-header .season-toggle.active::after { transform: translateX(14px); background: #4fc3f7; }

        .ep-list-season-eps {
            max-height: 0; overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .ep-list-season-eps.open { max-height: 5000px; }

        .ep-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 8px 8px 12px;
            border-radius: 8px; cursor: pointer;
            transition: background 0.15s;
        }
        .ep-item:hover { background: rgba(79,195,247,0.1); }
        .ep-item.now-playing { background: rgba(79,195,247,0.12); }

        .ep-num {
            font-size: 11px; font-weight: 700; color: #546e7a; min-width: 20px; text-align: right; flex-shrink: 0;
        }
        .ep-item.now-playing .ep-num { color: #4fc3f7; }

        .ep-thumb {
            width: 64px; height: 36px; border-radius: 4px;
            background: rgba(255,255,255,0.06); flex-shrink: 0;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .ep-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .ep-thumb .ep-num-overlay {
            font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4);
        }
        .ep-info { min-width: 0; flex: 1; }
        .ep-info .ep-title-text {
            font-size: 13px; color: #cfd8dc; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .ep-item.now-playing .ep-title-text { color: #4fc3f7; }

        /* ===== TOUCH DEVICES (hover: none) — smaller controls, bottom spacer, no btn-text ===== */
        @media (hover: none) and (pointer: coarse) {
            :root {
                --fs-width: clamp(40px, 10vw, 50px);
                --bottom-offset: 4px;
                --right-offset: 4px;
                --next-right: 6px;
            }
            .btn .btn-text { display: none; }
            .player-wrapper { height: calc(100dvh - 1px); }
            .mobile-bottom-spacer { display: block; height: 1px; }
            .trigger-full.disabled { pointer-events: none; }
            .show-name { font-size: clamp(12px, 2.2vw, 16px); }
            .episode-title { font-size: clamp(9px, 1.5vw, 12px); }
        }

        /* ===== VERY SMALL SCREENS (< 400px) ===== */
        @media (max-width: 400px) {
            .show-logo { height: 28px; }
            .controls { gap: 4px; margin-left: 4px; }
        }

        /* ===== LARGE SCREENS (≥ 1400px) ===== */
        @media (min-width: 1400px) {
            :root {
                --fs-width: 64px;
                --bottom-offset: 16px;
                --right-offset: 16px;
                --next-right: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="loading-screen" id="loadingScreen">
        <div class="spinner" id="loadingSpinner"></div>
        <div class="loading-title" id="loadingTitle">Caricamento...</div>
        <div class="loading-subtitle" id="loadingSubtitle">Preparazione episodi</div>
    </div>

    <div class="player-wrapper">
        <iframe id="player" allowfullscreen allow="autoplay; encrypted-media" src="about:blank"></iframe>
    </div>

    <div class="mobile-bottom-spacer"></div>

    <div class="trigger-full" id="triggerFull"></div>

    <div class="fs-overlay-btn" id="fsOverlayBtn">
        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </div>

    <button class="next-overlay-btn hidden" id="nextOverlayBtn" title="Prossimo episodio">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
        <span class="btn-text">Successivo</span>
    </button>

    <div class="top-bar hidden" id="topBar">
        <div class="show-info">
            <img id="showLogo" src="Gumball.png" alt="Gumball" class="show-logo" onerror="this.style.display='none'">
            <div class="show-details">
                <div class="show-name" id="showName">-</div>
                <div class="episode-title" id="episodeTitle">-</div>
            </div>
        </div>
        <div class="controls">
            <button class="btn btn-secondary" id="btnHistory" title="Episodio precedente">
                <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
            </button>
            <button class="btn btn-secondary" id="btnSettings" title="Impostazioni">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
            </button>
        </div>
    </div>

    <div class="transition-overlay" id="transitionOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Caricamento episodio...</div>
    </div>

    <div class="settings-backdrop" id="settingsBackdrop"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h2>Impostazioni</h2>
            <button class="settings-close" id="settingsClose">&times;</button>
        </div>
        <div id="settingsContent"></div>
    </div>

    <script>
        // ============================================
        // PWA
        // ============================================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }

        // ============================================
        // CONFIGURAZIONE — TUTTO DINAMICO
        // ============================================
        // Per aggiungere una serie basta aggiungerla qui.
        // Stagioni, episodi, chip e lista si generano da soli dal episodes.json
        const SHOWS_CONFIG = [
            { tmdbId: 37606, showName: 'Lo straordinario mondo di Gumball', logo: 'Gumball.png' },
            { tmdbId: 291904, showName: 'Lo strano e meraviglioso mondo di Gumball', logo: 'Gumball2.png', continuesAfter: 37606 }
        ];

        const CREDITS_SKIP_SECONDS = 33;
        const DB_REFRESH_DAYS = 3;

        const DB_URLS = [
            'episodes.json',
            'https://raw.githubusercontent.com/riukii/gumball-ita/refs/heads/main/episodes.json'
        ];

        // Calcola lo sfasamento stagioni per le serie che continuano un'altra
        // Se una serie ha continuesAfter, le sue stagioni vengono numerite come
        // proseguimento della serie indicata (es. S1 → Stagione 7 se la precedente ne ha 6)
        function getDisplaySeason(showId, season) {
            const cfg = SHOWS_CONFIG.find(s => s.tmdbId === showId);
            if (!cfg || !cfg.continuesAfter) return season;
            const prevShow = allEpisodes.filter(e => e.showId === cfg.continuesAfter);
            const prevSeasonCount = new Set(prevShow.map(e => e.season)).size;
            return season + prevSeasonCount;
        }

        // ============================================
        // STATO
        // ============================================
        let allEpisodes = [];
        let currentEpisode = null;
        let isFirstEpisode = false;
        let lastEpisodeIndices = [];
        const AVOID_REPEAT_COUNT = 5;
        let hideTimer = null;
        let isPaused = false;
        let hasTriggeredNext = false;
        let playerDuration = 0;
        let playerCurrentTime = 0;
        let loadCheckTimer = null;
        let consecutiveFailures = 0;
        const MAX_FAILS = 8;

        let wasFullscreen = false;
        let isLoading = false;

        // ============================================
        // SETTINGS (persistiti in localStorage)
        // ============================================
        const SETTINGS_KEY = 'gumball_settings';
        let settings = {
            selectedSeasons: {},   // { "37606_1": true, ... }  — dinamico
            autoSkip: true,
            playMode: 'random'     // 'random' | 'sequential'
        };

        function loadSettings() {
            try {
                const raw = localStorage.getItem(SETTINGS_KEY);
                if (raw) {
                    const saved = JSON.parse(raw);
                    if (saved.selectedSeasons) settings.selectedSeasons = saved.selectedSeasons;
                    if (typeof saved.autoSkip === 'boolean') settings.autoSkip = saved.autoSkip;
                    if (saved.playMode === 'sequential' || saved.playMode === 'random') settings.playMode = saved.playMode;
                }
            } catch {}
        }

        function saveSettings() {
            try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); } catch {}
        }

        function initDefaultSeasons() {
            // Dinamico: scorre allEpisodes e crea le chiavi per ogni show+season
            for (const ep of allEpisodes) {
                const key = `${ep.showId}_${ep.season}`;
                if (settings.selectedSeasons[key] === undefined) {
                    settings.selectedSeasons[key] = true;
                }
            }
            saveSettings();
        }

        function getFilteredEpisodes() {
            return allEpisodes.filter(ep => settings.selectedSeasons[`${ep.showId}_${ep.season}`] !== false);
        }

        // Trova il prossimo episodio in ordine sequenziale
        function getNextSequentialEpisode() {
            if (!currentEpisode) return getRandomEpisode();
            const pool = getFilteredEpisodes();
            if (pool.length === 0) return null;

            // Trova l'indice dell'episodio corrente nel pool filtrato
            const curIdx = pool.findIndex(ep =>
                ep.showId === currentEpisode.showId &&
                ep.season === currentEpisode.season &&
                ep.episode === currentEpisode.episode
            );

            if (curIdx === -1 || curIdx >= pool.length - 1) {
                // Riparti dall'inizio o episodio random se non trovato
                return pool[0];
            }
            return pool[curIdx + 1];
        }

        loadSettings();

        // ============================================
        // DOM
        // ============================================
        const $ = id => document.getElementById(id);
        const loadingScreen = $('loadingScreen');
        const loadingSpinner = $('loadingSpinner');
        const loadingTitle = $('loadingTitle');
        const loadingSubtitle = $('loadingSubtitle');
        const player = $('player');
        const topBar = $('topBar');
        const showNameEl = $('showName');
        const episodeTitleEl = $('episodeTitle');

        const transitionOverlay = $('transitionOverlay');
        const loadingText = $('loadingText');
        const nextOverlayBtn = $('nextOverlayBtn');
        const btnHistory = $('btnHistory');
        const btnSettings = $('btnSettings');
        const fsOverlayBtn = $('fsOverlayBtn');
        const showLogoEl = $('showLogo');
        const triggerFull = $('triggerFull');
        const settingsPanel = $('settingsPanel');
        const settingsBackdrop = $('settingsBackdrop');
        const settingsClose = $('settingsClose');
        const settingsContent = $('settingsContent');

        // ============================================
        // SETTINGS PANEL UI — TUTTO DINAMICO
        // ============================================
        function openSettings() {
            renderSettings();
            settingsPanel.classList.add('open');
            settingsBackdrop.classList.add('open');
            clearTimeout(hideTimer);
        }

        function closeSettings() {
            settingsPanel.classList.remove('open');
            settingsBackdrop.classList.remove('open');
        }

        function renderSettings() {
            let html = '';

            const showIds = [...new Set(allEpisodes.map(e => e.showId))];

            // --- Sezione riproduzione ---
            html += `<div class="settings-section">`;
            html += `<div class="settings-section-title">Riproduzione</div>`;

            // Toggle: Random / Sequenziale
            html += `<div class="toggle-row">`;
            html += `<div class="toggle-label">Ordine sequenziale<small>Al posto di random, episodi in ordine</small></div>`;
            html += `<div class="toggle-switch ${settings.playMode === 'sequential' ? 'active' : ''}" id="togglePlayMode"></div>`;
            html += `</div>`;

            // Toggle: Skip automatico
            html += `<div class="toggle-row">`;
            html += `<div class="toggle-label">Skip automatico<small>Salta intro e outro</small></div>`;
            html += `<div class="toggle-switch ${settings.autoSkip ? 'active' : ''}" id="toggleAutoSkip"></div>`;
            html += `</div></div>`;

            // --- Lista episodi (dinamica) ---
            html += `<div class="settings-section">`;
            html += `<div class="settings-section-title" style="display:flex;align-items:center;justify-content:space-between;">Episodi <button id="btnEnableAll" style="background:rgba(79,195,247,0.15);border:1px solid rgba(79,195,247,0.25);color:#4fc3f7;font-size:11px;padding:3px 10px;border-radius:6px;cursor:pointer;font-weight:600;letter-spacing:0.3px;">Attiva/Disattiva tutte</button></div>`;
            html += `<div id="episodeListContainer">`;

            for (const showId of showIds) {
                const cfg = SHOWS_CONFIG.find(s => s.tmdbId === showId) || { showName: `Serie ${showId}` };
                const showEps = allEpisodes.filter(e => e.showId === showId);
                const seasons = [...new Set(showEps.map(e => e.season))].sort((a, b) => a - b);

                html += `<div class="ep-list-show">`;
                html += `<div class="ep-list-show-name">${cfg.showName}</div>`;

                for (const s of seasons) {
                    const sEps = showEps.filter(e => e.season === s).sort((a, b) => a.episode - b.episode);
                    const seasonKey = `season_${showId}_${s}`;

                    const seasonFilterKey = `${showId}_${s}`;
                    const seasonActive = settings.selectedSeasons[seasonFilterKey] !== false;

                    html += `<div class="ep-list-season" data-season-key="${seasonKey}">`;
                    html += `<div class="ep-list-season-header" data-target="${seasonKey}" data-filter-key="${seasonFilterKey}">`;
                    html += `<span class="arrow">&#9654;</span>`;
                    html += `<span class="season-label">Stagione ${getDisplaySeason(showId, s)}</span>`;
                    html += `<span class="season-count">${sEps.length} ep</span>`;
                    html += `<span class="season-toggle ${seasonActive ? 'active' : ''}" data-filter-key="${seasonFilterKey}"></span>`;
                    html += `</div>`;
                    html += `<div class="ep-list-season-eps" id="${seasonKey}">`;

                    for (const ep of sEps) {
                        const isCurrent = currentEpisode &&
                            currentEpisode.showId === ep.showId &&
                            currentEpisode.season === ep.season &&
                            currentEpisode.episode === ep.episode;

                        html += `<div class="ep-item ${isCurrent ? 'now-playing' : ''}" 
                            data-showid="${ep.showId}" data-season="${ep.season}" data-episode="${ep.episode}">`;
                        html += `<span class="ep-num">${ep.episode}</span>`;
                        html += `<div class="ep-thumb">`;
                        if (ep.thumb) {
                            html += `<img src="${ep.thumb}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display=''">`;
                            html += `<span class="ep-num-overlay" style="display:none">${ep.episode}</span>`;
                        } else {
                            html += `<span class="ep-num-overlay">${ep.episode}</span>`;
                        }
                        html += `</div>`;
                        html += `<div class="ep-info">`;
                        html += `<div class="ep-title-text">${ep.title}</div>`;
                        html += `</div>`;
                        html += `</div>`;
                    }

                    html += `</div></div>`;
                }

                html += `</div>`;
            }

            html += `</div></div>`;

            settingsContent.innerHTML = html;

            // Bind season filter toggles
            settingsContent.querySelectorAll('.season-toggle').forEach(toggle => {
                toggle.addEventListener('click', (e) => {
                    e.stopPropagation(); // non chiudere/aprire l'accordion
                    const key = toggle.dataset.filterKey;
                    settings.selectedSeasons[key] = !settings.selectedSeasons[key];
                    if (getFilteredEpisodes().length === 0) settings.selectedSeasons[key] = true;
                    toggle.classList.toggle('active', settings.selectedSeasons[key]);
                    saveSettings();
                    lastEpisodeIndices = [];
                });
            });

            // Bind play mode toggle
            const toggleMode = settingsContent.querySelector('#togglePlayMode');
            if (toggleMode) {
                toggleMode.addEventListener('click', () => {
                    settings.playMode = settings.playMode === 'random' ? 'sequential' : 'random';
                    toggleMode.classList.toggle('active', settings.playMode === 'sequential');
                    saveSettings();
                });
            }

            // Bind auto-skip toggle
            const toggleSkip = settingsContent.querySelector('#toggleAutoSkip');
            if (toggleSkip) {
                toggleSkip.addEventListener('click', () => {
                    settings.autoSkip = !settings.autoSkip;
                    toggleSkip.classList.toggle('active', settings.autoSkip);
                    saveSettings();
                });
            }

            // Bind season collapsible headers
            settingsContent.querySelectorAll('.ep-list-season-header').forEach(header => {
                header.addEventListener('click', () => {
                    const target = header.dataset.target;
                    const epsDiv = settingsContent.querySelector(`#${target}`);
                    const arrow = header.querySelector('.arrow');
                    if (epsDiv) {
                        epsDiv.classList.toggle('open');
                        arrow.classList.toggle('open');
                    }
                });
            });

            // Bind "enable/disable all seasons" button
            const btnEnableAll = settingsContent.querySelector('#btnEnableAll');
            if (btnEnableAll) {
                btnEnableAll.addEventListener('click', () => {
                    const allActive = Object.values(settings.selectedSeasons).every(v => v !== false);
                    if (allActive) {
                        // Disattiva tutte tranne la stagione dell'episodio corrente
                        const seasonKeys = [...new Set(allEpisodes.map(ep => `${ep.showId}_${ep.season}`))];
                        const keepKey = currentEpisode ? `${currentEpisode.showId}_${currentEpisode.season}` : seasonKeys[0];
                        for (const key of seasonKeys) {
                            settings.selectedSeasons[key] = (key === keepKey);
                        }
                    } else {
                        // Attiva tutte
                        for (const ep of allEpisodes) {
                            const key = `${ep.showId}_${ep.season}`;
                            settings.selectedSeasons[key] = true;
                        }
                    }
                    saveSettings();
                    lastEpisodeIndices = [];
                    // Re-render to update toggle states
                    renderSettings();
                });
            }

            // Bind episode click → play
            settingsContent.querySelectorAll('.ep-item').forEach(item => {
                item.addEventListener('click', () => {
                    const showId = parseInt(item.dataset.showid);
                    const season = parseInt(item.dataset.season);
                    const episode = parseInt(item.dataset.episode);
                    const ep = allEpisodes.find(e => e.showId === showId && e.season === season && e.episode === episode);
                    if (ep) {
                        closeSettings();
                        playEpisode(ep, false);
                    }
                });
            });
        }

        btnSettings.addEventListener('click', openSettings);
        settingsClose.addEventListener('click', closeSettings);
        settingsBackdrop.addEventListener('click', closeSettings);

        // ============================================
        // FULLSCREEN
        // ============================================
        const fsSvgEnter = '<svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>';
        const fsSvgExit = '<svg viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>';

        function toggleFullscreen() {
            if (document.fullscreenElement) { document.exitFullscreen(); }
            else { document.documentElement.requestFullscreen().catch(() => {}); }
        }

        document.addEventListener('fullscreenchange', () => {
            const isFs = !!document.fullscreenElement;
            wasFullscreen = isFs;
            fsOverlayBtn.innerHTML = isFs ? fsSvgExit : fsSvgEnter;
            if (isFs) {
                document.documentElement.classList.add('is-fullscreen');
                // Su mobile: forza landscape quando si entra in fullscreen
                if (isTouchDevice && screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(() => {});
                }
            } else {
                document.documentElement.classList.remove('is-fullscreen');
                // Su mobile: sblocca l'orientamento quando si esce dal fullscreen
                if (isTouchDevice && screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
            }
            detectSafeBottom();
        });

        function restoreFullscreen() {
            if (wasFullscreen && !document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
        }

        fsOverlayBtn.addEventListener('click', (e) => {
            e.preventDefault(); e.stopPropagation(); toggleFullscreen();
        });

        // ============================================
        // OVERLAY + TRIGGER ZONES
        // ============================================
        function enableTriggers() {
            triggerFull.classList.remove('disabled');
        }
        function disableTriggers() {
            triggerFull.classList.add('disabled');
        }

        function showOverlay() {
            topBar.classList.remove('hidden');
            nextOverlayBtn.classList.remove('hidden');
            disableTriggers(); startHideTimer();
        }

        function hideOverlay() {
            if (isLoading) return;
            if (settingsPanel.classList.contains('open')) return;
            // Su mobile: nascondi sempre dopo il timeout (anche se in pausa)
            // Su PC: mantieni l'overlay visibile se il video è in pausa
            if (!isTouchDevice && isPaused) return;
            topBar.classList.add('hidden'); nextOverlayBtn.classList.add('hidden'); enableTriggers();
        }

        function startHideTimer() {
            clearTimeout(hideTimer);
            // Su mobile: il timer parte sempre; su PC: solo se non in pausa
            if (settingsPanel.classList.contains('open')) return;
            if (!isTouchDevice && (isPaused || isLoading)) return;
            if (isLoading) return;
            hideTimer = setTimeout(hideOverlay, 2500);
        }

        const isTouchDevice = window.matchMedia('(hover: none) and (pointer: coarse)').matches;

        // Rileva safe-bottom per Firefox mobile
        function detectSafeBottom() {
            const vh = window.innerHeight;
            const dvh = window.visualViewport ? window.visualViewport.height : vh;
            const safeBottom = Math.max(0, vh - dvh);
            document.documentElement.style.setProperty('--safe-bottom', safeBottom + 'px');
        }
        detectSafeBottom();
        if (window.visualViewport) window.visualViewport.addEventListener('resize', detectSafeBottom);
        window.addEventListener('resize', detectSafeBottom);

        // PC: mouseenter/mousemove su trigger-full mostra overlay
        // (mousemove needed because when trigger-full re-enables after auto-hide,
        //  if the mouse is already inside, mouseenter won't fire)
        // Mobile: touchstart su trigger-full mostra overlay
        triggerFull.addEventListener('mouseenter', showOverlay);
        triggerFull.addEventListener('mousemove', showOverlay);
        triggerFull.addEventListener('touchstart', (e) => {
            e.preventDefault();
            showOverlay();
        });

        // Su PC, hover su elementi UI ferma il timer; su mobile no
        if (!isTouchDevice) {
            topBar.addEventListener('mouseenter', () => { clearTimeout(hideTimer); });
            nextOverlayBtn.addEventListener('mouseenter', () => { clearTimeout(hideTimer); });
            fsOverlayBtn.addEventListener('mouseenter', () => { clearTimeout(hideTimer); });
            topBar.addEventListener('mouseleave', startHideTimer);
            nextOverlayBtn.addEventListener('mouseleave', startHideTimer);
            fsOverlayBtn.addEventListener('mouseleave', startHideTimer);
        }
        window.addEventListener('focus', showOverlay);

        // ============================================
        // RANDOMIZATION
        // ============================================
        function secureRandomInt(max) {
            if (max <= 0) return 0;
            const limit = Math.floor(0xFFFFFFFF / max) * max;
            const arr = new Uint32Array(1); let val;
            do { crypto.getRandomValues(arr); val = arr[0]; } while (val >= limit);
            return val % max;
        }

        function getRandomEpisode() {
            const pool = getFilteredEpisodes();
            if (pool.length === 0) return null;
            if (pool.length === 1) return pool[0];
            let ep, attempts = 0;
            do { ep = pool[secureRandomInt(pool.length)]; attempts++; }
            while (lastEpisodeIndices.some(i => allEpisodes[i] === ep) && attempts < 50);
            const idx = allEpisodes.indexOf(ep);
            lastEpisodeIndices.push(idx);
            if (lastEpisodeIndices.length > Math.min(AVOID_REPEAT_COUNT, allEpisodes.length - 1)) lastEpisodeIndices.shift();
            return ep;
        }

        // ============================================
        // CACHE
        // ============================================
        const CACHE_KEY = 'gumball_db';
        const CACHE_VER = 10;

        function loadCache() {
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (!raw) return null;
                const p = JSON.parse(raw);
                if (!p || p.v !== CACHE_VER || !p.episodes || !p.episodes.length) return null;
                return { episodes: p.episodes, ts: p.ts || 0 };
            } catch { return null; }
        }
        function saveCache(episodes) { try { localStorage.setItem(CACHE_KEY, JSON.stringify({ v: CACHE_VER, ts: Date.now(), episodes })); } catch {} }
        function isStale(ts) { return (Date.now() - ts) >= DB_REFRESH_DAYS * 24 * 60 * 60 * 1000; }

        // ============================================
        // DATABASE LOADER
        // ============================================
        function flattenDb(db) {
            const eps = [];
            if (!db || !db.shows) return eps;
            for (const show of db.shows) {
                const cfg = SHOWS_CONFIG.find(s => s.tmdbId === show.tmdbId) || { showName: show.showName, logo: show.logo };
                if (show.episodes) {
                    for (const ep of show.episodes) {
                        eps.push({ showId: show.tmdbId, showName: cfg.showName, logo: cfg.logo, season: ep.season, episode: ep.episode, title: ep.title, thumb: ep.thumb || '' });
                    }
                }
            }
            return eps;
        }

        async function fetchJson() {
            for (const url of DB_URLS) {
                try {
                    const res = await fetch(url, { cache: 'no-store' });
                    if (!res.ok) continue;
                    const data = await res.json();
                    const eps = flattenDb(data);
                    if (eps.length > 0) { console.log(`[Gumball] Caricato da: ${url}`); return eps; }
                } catch { continue; }
            }
            return null;
        }

        // ============================================
        // INIT
        // ============================================
        async function initializeApp() {
            loadingScreen.classList.remove('hidden');

            const cached = loadCache();
            if (cached) {
                allEpisodes = cached.episodes;
                initDefaultSeasons();
                console.log(`[Gumball] Cache: ${allEpisodes.length} episodi`);
                loadingScreen.classList.add('hidden');
                playRandomEpisode();
                if (isStale(cached.ts)) backgroundRefresh();
                return;
            }

            loadingSubtitle.textContent = 'Caricamento database...';
            const jsonEps = await fetchJson();
            if (jsonEps && jsonEps.length > 0) {
                allEpisodes = jsonEps;
                saveCache(allEpisodes);
                initDefaultSeasons();
                console.log(`[Gumball] JSON: ${allEpisodes.length} episodi`);
                loadingScreen.classList.add('hidden');
                playRandomEpisode();
                return;
            }

            showError('Impossibile caricare gli episodi. Controlla la connessione.');
        }

        async function backgroundRefresh() {
            console.log('[Gumball] Cache scaduta, controllo aggiornamenti...');
            const fresh = await fetchJson();
            if (!fresh || !fresh.length) return;
            if (fresh.length !== allEpisodes.length) {
                console.log(`[Gumball] Aggiornamento: ${allEpisodes.length} → ${fresh.length} episodi`);
                allEpisodes = fresh;
                initDefaultSeasons();
            }
            saveCache(allEpisodes);
        }

        function showError(msg) {
            loadingTitle.textContent = 'Errore';
            loadingSubtitle.textContent = msg;
            loadingSpinner.style.display = 'none';
            const old = loadingScreen.querySelector('.loading-retry-btn');
            if (old) old.remove();
            const btn = document.createElement('button');
            btn.className = 'loading-retry-btn';
            btn.textContent = 'Riprova';
            btn.onclick = () => { allEpisodes = []; loadingSpinner.style.display = ''; btn.remove(); initializeApp(); };
            loadingScreen.appendChild(btn);
        }

        // ============================================
        // EPISODI
        // ============================================
        function buildUrl(ep) {
            let url = `https://vixsrc.to/tv/${ep.showId}/${ep.season}/${ep.episode}?lang=it`;
            if (settings.autoSkip) {
                url += '&startAt=24';
            }
            url += '&primaryColor=46B4C9&secondaryColor=001117';
            return url;
        }

        // ===== Rilevamento 404 intelligente =====
        // Usa iframe.onload per distinguere tra "pagina caricata ma niente player" (404)
        // e "connessione lenta" (iframe non ha ancora caricato).
        // Quando l'iframe carica (anche una pagina 404), parte un timer breve.
        // Se entro quel timer non riceviamo un evento "play" dal player → 404.
        let iframeLoaded = false;
        const POST_LOAD_TIMEOUT = 8000; // dopo che l'iframe ha caricato, aspetta 8s per un evento play/timeupdate

        function playEpisode(ep, isAutoNext = false) {
            clearTimeout(loadCheckTimer);
            currentEpisode = ep;
            hasTriggeredNext = false;
            iframeLoaded = false;
            isLoading = true;
            playerDuration = 0; playerCurrentTime = 0; isPaused = false;

            showNameEl.textContent = ep.showName;
            episodeTitleEl.innerHTML = ep.title + '<span class="ep-separator">-</span><span class="ep-season-info">Stag. ' + getDisplaySeason(ep.showId, ep.season) + ' \u2022 Ep. ' + ep.episode + '</span>';
            showLogoEl.src = ep.logo;

            console.log(`[Gumball] S${ep.season}E${ep.episode} - "${ep.title}" [skip=${settings.autoSkip}, mode=${settings.playMode}]`);
            setTimeout(() => { player.src = buildUrl(ep); }, 300);

            // Timeout globale di sicurezza (45s) — se l'iframe non carica proprio
            loadCheckTimer = setTimeout(() => {
                console.warn(`[Gumball] S${ep.season}E${ep.episode} iframe non ha caricato entro 45s — skip`);
                if (++consecutiveFailures >= MAX_FAILS) { showError('Troppi episodi non disponibili.'); isLoading = false; return; }
                isLoading = false;
                setTimeout(() => playRandomEpisode(), 400);
            }, 45000);

            saveToHistory(ep);
            // Mostra overlay e MANTIENI visibile (isLoading=true blocca hideOverlay)
            showOverlay();
            clearTimeout(hideTimer);
            setTimeout(restoreFullscreen, 500);
        }

        // Quando l'iframe carica (anche pagina 404), inizia il timer post-load
        player.addEventListener('load', () => {
            if (!currentEpisode) return;
            iframeLoaded = true;
            clearTimeout(loadCheckTimer);

            // Dopo che l'iframe ha caricato, aspettiamo un evento play/timeupdate
            loadCheckTimer = setTimeout(() => {
                console.warn(`[Gumball] S${currentEpisode.season}E${currentEpisode.episode} — nessun play dopo caricamento, probabile 404`);
                if (++consecutiveFailures >= MAX_FAILS) { showError('Troppi episodi non disponibili.'); isLoading = false; return; }
                isLoading = false;
                setTimeout(() => playRandomEpisode(), 400);
            }, POST_LOAD_TIMEOUT);
        });

        function playRandomEpisode() { const ep = getRandomEpisode(); if (ep) playEpisode(ep, false); }

        function playNextEpisode() {
            if (settings.playMode === 'sequential') {
                const ep = getNextSequentialEpisode();
                if (ep) playEpisode(ep, true);
            } else {
                const ep = getRandomEpisode();
                if (ep) playEpisode(ep, true);
            }
        }

        // ============================================
        // STORICO
        // ============================================
        function saveToHistory(ep) {
            try {
                const h = JSON.parse(localStorage.getItem('gumball_history') || '[]');
                h.unshift({ showId: ep.showId, showName: ep.showName, season: ep.season, episode: ep.episode, title: ep.title, ts: Date.now() });
                if (h.length > 50) h.pop();
                localStorage.setItem('gumball_history', JSON.stringify(h));
            } catch {}
        }

        function goBackToPrevious() {
            try {
                const h = JSON.parse(localStorage.getItem('gumball_history') || '[]');
                if (h.length >= 2) playEpisode(h[1], false);
            } catch {}
        }

        // ============================================
        // PLAYER EVENTS
        // ============================================
        function extractEvent(d) {
            if (!d || d.type !== 'PLAYER_EVENT') return null;
            if (d.data && d.data.event) return d.data;
            if (d.event && d.event.event) return d.event;
            return null;
        }

        window.addEventListener('message', (event) => {
            const pe = extractEvent(event.data);
            if (!pe) return;
            const ct = parseFloat(pe.currentTime) || 0;
            const dur = parseFloat(pe.duration) || 0;
            if (ct > 0) playerCurrentTime = ct;
            if (dur > 0) playerDuration = dur;

            switch (pe.event) {
                case 'play':
                    isPaused = false; isFirstEpisode = false; isLoading = false;
                    clearTimeout(loadCheckTimer); consecutiveFailures = 0;
                    transitionOverlay.classList.remove('active');
                    startHideTimer();
                    break;
                case 'pause':
                    isPaused = true; clearTimeout(hideTimer); showOverlay();
                    break;
                case 'timeupdate':
                    if (isLoading) { isLoading = false; clearTimeout(loadCheckTimer); consecutiveFailures = 0; }
                    transitionOverlay.classList.remove('active');
                    if (playerDuration > 0 && playerCurrentTime > 0 && !hasTriggeredNext) {
                        const rem = playerDuration - playerCurrentTime;
                        if (settings.autoSkip) {
                            if (rem <= CREDITS_SKIP_SECONDS) {
                                hasTriggeredNext = true;
                                console.log(`[Gumball] ${rem.toFixed(1)}s rimanenti — skip!`);
                                playNextEpisode();
                            }
                        } else {
                            if (rem <= 2) {
                                hasTriggeredNext = true;
                                console.log(`[Gumball] Episodio finito — prossimo!`);
                                playNextEpisode();
                            }
                        }
                    }
                    break;
            }
        });



        // ============================================
        // BUTTONS
        // ============================================
        nextOverlayBtn.addEventListener('click', playNextEpisode);
        btnHistory.addEventListener('click', goBackToPrevious);

        // ============================================
        // AVVIO
        // ============================================
        initializeApp();
    </script>
</body>
</html>
