<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Gumball.png">
    <title>Gumball</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh; width: 100vw;
        }

        /* ===== LOADING SCREEN ===== */
        .loading-screen {
            position: fixed; inset: 0; z-index: 400;
            background: linear-gradient(135deg, #0d1117, #161b22);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
        }
        .loading-screen.hidden { display: none; }

        .spinner {
            width: 56px; height: 56px;
            border: 3px solid rgba(79,195,247,0.2); border-top-color: #4fc3f7;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-title { font-size: 20px; font-weight: 600; color: #e0e0e0; }
        .loading-subtitle { font-size: 14px; color: #78909c; text-align: center; max-width: 320px; line-height: 1.6; }

        .loading-retry-btn {
            margin-top: 8px; padding: 10px 24px; border: none; border-radius: 10px;
            background: linear-gradient(135deg, #4fc3f7, #7c4dff);
            color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
            transition: transform 0.2s;
        }
        .loading-retry-btn:hover { transform: scale(1.05); }

        /* ===== PLAYER ===== */
        .player-wrapper { position: relative; width: 100%; height: 100vh; background: #000; }
        .player-wrapper iframe { width: 100%; height: 100%; border: none; }

        /* ===== TOP BAR ===== */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 28px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.92), rgba(0,0,0,0.6) 55%, transparent);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .top-bar.hidden { opacity: 0; transform: translateY(-20px); pointer-events: none; }

        .show-info { display: flex; align-items: center; gap: 18px; min-width: 0; flex: 1; }

        .show-logo {
            height: 56px; width: auto; max-width: 120px;
            object-fit: contain; border-radius: 14px; flex-shrink: 0;
        }
        .show-details { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
        .show-name { font-size: 22px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .episode-title { font-size: 16px; font-weight: 500; color: #b0bec5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .controls { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-left: 16px; }

        .btn {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 20px; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.2s ease; white-space: nowrap;
        }
        .btn-primary { background: linear-gradient(135deg, #4fc3f7, #7c4dff); color: #fff; }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(79,195,247,0.3); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-secondary { background: rgba(255,255,255,0.12); color: #e0e0e0; backdrop-filter: blur(10px); }
        .btn-secondary:hover { background: rgba(255,255,255,0.22); }
        .btn svg { width: 18px; height: 18px; fill: currentColor; }

        /* ===== BOTTOM CENTER: Stagione / Episodio ===== */
        .bottom-info {
            position: fixed; bottom: 17px; left: 50%; transform: translateX(-50%); z-index: 101;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(14px);
            padding: 5px 14px; border-radius: 16px;
            font-size: 17px; color: #e0e0e0;
            border: 1px solid rgba(255,255,255,0.07);
            transition: opacity 0.4s ease; pointer-events: none; white-space: nowrap;
        }
        .bottom-info.hidden { opacity: 0; }
        .bottom-info .hl { color: #4fc3f7; font-weight: 600; }

        /* ===== TRANSITION OVERLAY ===== */
        .transition-overlay {
            position: fixed; inset: 0; z-index: 200; background: #0a0a0f;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .transition-overlay.active { opacity: 1; pointer-events: all; }
        .transition-overlay .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(79,195,247,0.2); border-top-color: #4fc3f7;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        .loading-text { font-size: 16px; color: #9e9e9e; font-weight: 500; }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            .show-name { font-size: 17px; }
            .episode-title { font-size: 13px; }
            .show-logo { height: 44px; border-radius: 12px; }
            .top-bar { padding: 14px 16px; }
            .show-info { gap: 12px; }
            .btn { padding: 8px 14px; font-size: 13px; }
            .btn .btn-text { display: none; }
            .bottom-info { bottom: 14px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="loading-screen" id="loadingScreen">
        <div class="spinner" id="loadingSpinner"></div>
        <div class="loading-title" id="loadingTitle">Caricamento...</div>
        <div class="loading-subtitle" id="loadingSubtitle">Preparazione episodi</div>
    </div>

    <div class="player-wrapper">
        <iframe id="player" allowfullscreen allow="autoplay; encrypted-media" src="about:blank"></iframe>
    </div>

    <div class="top-bar hidden" id="topBar">
        <div class="show-info">
            <img id="showLogo" src="Gumball.png" alt="Gumball" class="show-logo" onerror="this.style.display='none'">
            <div class="show-details">
                <div class="show-name" id="showName">-</div>
                <div class="episode-title" id="episodeTitle">-</div>
            </div>
        </div>
        <div class="controls">
            <button class="btn btn-secondary" id="btnHistory" title="Episodio precedente">
                <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
            </button>
            <button class="btn btn-primary" id="btnRandom" title="Episodio random">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
                <span class="btn-text">Random</span>
            </button>
        </div>
    </div>

    <div class="bottom-info hidden" id="bottomInfo">
        Stagione <span class="hl" id="seasonNum">-</span> &middot; Episodio <span class="hl" id="episodeNum">-</span>
    </div>

    <div class="transition-overlay" id="transitionOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Caricamento episodio...</div>
    </div>

    <script>
        // ============================================
        // CONFIGURAZIONE
        // ============================================
        const SHOWS_CONFIG = [
            { tmdbId: 37606, showName: 'Lo straordinario mondo di Gumball', logo: 'Gumball.png' },
            { tmdbId: 291904, showName: 'Lo strano e meraviglioso mondo di Gumball', logo: 'Gumball2.png' }
        ];

        const CREDITS_SKIP_SECONDS = 33;
        const DB_REFRESH_DAYS = 3;
        const EPISODES_JSON_URL = 'episodes.json';

        // ============================================
        // STATO
        // ============================================
        let allEpisodes = [];
        let currentEpisode = null;
        let lastEpisodeIndices = [];
        const AVOID_REPEAT_COUNT = 5;
        let hideTimer = null;
        let isPaused = false;
        let hasTriggeredNext = false;
        let playerDuration = 0;
        let playerCurrentTime = 0;
        let loadCheckTimer = null;
        let consecutiveFailures = 0;
        const MAX_FAILS = 8;
        const LOAD_TIMEOUT = 4000; // 4s

        // ============================================
        // DOM
        // ============================================
        const $ = id => document.getElementById(id);
        const loadingScreen = $('loadingScreen');
        const loadingSpinner = $('loadingSpinner');
        const loadingTitle = $('loadingTitle');
        const loadingSubtitle = $('loadingSubtitle');
        const player = $('player');
        const topBar = $('topBar');
        const showNameEl = $('showName');
        const episodeTitleEl = $('episodeTitle');
        const bottomInfo = $('bottomInfo');
        const seasonNumEl = $('seasonNum');
        const episodeNumEl = $('episodeNum');
        const transitionOverlay = $('transitionOverlay');
        const loadingText = $('loadingText');
        const btnRandom = $('btnRandom');
        const btnHistory = $('btnHistory');
        const showLogoEl = $('showLogo');

        // ============================================
        // RANDOMIZATION (crypto, no bias, evita ripetizioni)
        // ============================================
        function secureRandomInt(max) {
            if (max <= 0) return 0;
            const limit = Math.floor(0xFFFFFFFF / max) * max;
            const arr = new Uint32Array(1);
            let val;
            do { crypto.getRandomValues(arr); val = arr[0]; } while (val >= limit);
            return val % max;
        }

        function getRandomEpisode() {
            if (allEpisodes.length === 0) return null;
            if (allEpisodes.length === 1) return allEpisodes[0];
            let idx, attempts = 0;
            do { idx = secureRandomInt(allEpisodes.length); attempts++; }
            while (lastEpisodeIndices.includes(idx) && attempts < 50);
            lastEpisodeIndices.push(idx);
            if (lastEpisodeIndices.length > Math.min(AVOID_REPEAT_COUNT, allEpisodes.length - 1))
                lastEpisodeIndices.shift();
            return allEpisodes[idx];
        }

        // ============================================
        // CACHE (localStorage)
        // ============================================
        const CACHE_KEY = 'gumball_db';
        const CACHE_VER = 8;

        function loadCache() {
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (!raw) return null;
                const p = JSON.parse(raw);
                if (!p || p.v !== CACHE_VER || !p.episodes || !p.episodes.length) return null;
                return { episodes: p.episodes, ts: p.ts || 0 };
            } catch { return null; }
        }

        function saveCache(episodes) {
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify({ v: CACHE_VER, ts: Date.now(), episodes }));
            } catch {}
        }

        function isStale(ts) {
            return (Date.now() - ts) >= DB_REFRESH_DAYS * 24 * 60 * 60 * 1000;
        }

        // ============================================
        // DATABASE LOADER
        // ============================================
        // episodes.json → array piatto di episodi
        function flattenDb(db) {
            const eps = [];
            if (!db || !db.shows) return eps;
            for (const show of db.shows) {
                const cfg = SHOWS_CONFIG.find(s => s.tmdbId === show.tmdbId) || { showName: show.showName, logo: show.logo };
                if (show.episodes) {
                    for (const ep of show.episodes) {
                        eps.push({
                            showId: show.tmdbId, showName: cfg.showName, logo: cfg.logo,
                            season: ep.season, episode: ep.episode, title: ep.title
                        });
                    }
                }
            }
            return eps;
        }

        async function fetchJson() {
            try {
                const res = await fetch(EPISODES_JSON_URL, { cache: 'no-store' });
                if (!res.ok) return null;
                return flattenDb(await res.json());
            } catch { return null; }
        }

        // ============================================
        // INIT
        // ============================================
        async function initializeApp() {
            loadingScreen.classList.remove('hidden');

            // 1. Cache locale → istantaneo
            const cached = loadCache();
            if (cached) {
                allEpisodes = cached.episodes;
                console.log(`[Gumball] Cache: ${allEpisodes.length} episodi`);
                loadingScreen.classList.add('hidden');
                playRandomEpisode();
                if (isStale(cached.ts)) backgroundRefresh();
                return;
            }

            // 2. episodes.json
            loadingSubtitle.textContent = 'Caricamento database...';
            const jsonEps = await fetchJson();
            if (jsonEps && jsonEps.length > 0) {
                allEpisodes = jsonEps;
                saveCache(allEpisodes);
                console.log(`[Gumball] JSON: ${allEpisodes.length} episodi`);
                loadingScreen.classList.add('hidden');
                playRandomEpisode();
                return;
            }

            // 3. Errore
            showError('Impossibile caricare gli episodi. Apri il sito da GitHub Pages o aggiorna episodes.json.');
        }

        async function backgroundRefresh() {
            console.log('[Gumball] Cache scaduta, controllo aggiornamenti...');
            const fresh = await fetchJson();
            if (!fresh || !fresh.length) return;
            if (fresh.length !== allEpisodes.length) {
                console.log(`[Gumball] Aggiornamento: ${allEpisodes.length} → ${fresh.length} episodi`);
                allEpisodes = fresh;
            }
            saveCache(allEpisodes);
        }

        function showError(msg) {
            loadingTitle.textContent = 'Errore';
            loadingSubtitle.textContent = msg;
            loadingSpinner.style.display = 'none';
            const old = loadingScreen.querySelector('.loading-retry-btn');
            if (old) old.remove();
            const btn = document.createElement('button');
            btn.className = 'loading-retry-btn';
            btn.textContent = 'Riprova';
            btn.onclick = () => {
                allEpisodes = []; loadingSpinner.style.display = ''; btn.remove(); initializeApp();
            };
            loadingScreen.appendChild(btn);
        }

        // ============================================
        // EPISODI
        // ============================================
        function buildUrl(ep) {
            return `https://vixsrc.to/tv/${ep.showId}/${ep.season}/${ep.episode}?lang=it&startAt=22&primaryColor=46B4C9&secondaryColor=001117`;
        }

        function playEpisode(ep, isAutoNext = false) {
            clearTimeout(loadCheckTimer);
            currentEpisode = ep;
            hasTriggeredNext = false;
            playerDuration = 0;
            playerCurrentTime = 0;
            isPaused = false;

            loadingText.textContent = isAutoNext ? 'Prossimo episodio...' : 'Caricamento episodio...';
            transitionOverlay.classList.add('active');

            showNameEl.textContent = ep.showName;
            episodeTitleEl.textContent = ep.title;
            seasonNumEl.textContent = ep.season;
            episodeNumEl.textContent = ep.episode;
            showLogoEl.src = ep.logo;

            console.log(`[Gumball] S${ep.season}E${ep.episode} - "${ep.title}"`);
            setTimeout(() => { player.src = buildUrl(ep); }, 300);

            // 4s senza play → skip
            loadCheckTimer = setTimeout(() => {
                console.warn(`[Gumball] S${ep.season}E${ep.episode} non disponibile`);
                if (++consecutiveFailures >= MAX_FAILS) { showError('Troppi episodi non disponibili.'); return; }
                loadingText.textContent = 'Episodio non disponibile, prossimo...';
                transitionOverlay.classList.add('active');
                setTimeout(() => playNextRandomEpisode(), 800);
            }, LOAD_TIMEOUT);

            saveToHistory(ep);
            showOverlay();
        }

        function playRandomEpisode() { const ep = getRandomEpisode(); if (ep) playEpisode(ep, false); }
        function playNextRandomEpisode() { const ep = getRandomEpisode(); if (ep) playEpisode(ep, true); }

        // ============================================
        // STORICO
        // ============================================
        function saveToHistory(ep) {
            try {
                const h = JSON.parse(localStorage.getItem('gumball_history') || '[]');
                h.unshift({ showId: ep.showId, showName: ep.showName, season: ep.season, episode: ep.episode, title: ep.title, ts: Date.now() });
                if (h.length > 50) h.pop();
                localStorage.setItem('gumball_history', JSON.stringify(h));
            } catch {}
        }

        function goBackToPrevious() {
            try {
                const h = JSON.parse(localStorage.getItem('gumball_history') || '[]');
                if (h.length >= 2) playEpisode(h[1], false);
            } catch {}
        }

        // ============================================
        // OVERLAY
        // ============================================
        function showOverlay() { topBar.classList.remove('hidden'); bottomInfo.classList.remove('hidden'); startHideTimer(); }
        function hideOverlay() { if (isPaused) return; topBar.classList.add('hidden'); bottomInfo.classList.add('hidden'); }
        function startHideTimer() { clearTimeout(hideTimer); if (!isPaused) hideTimer = setTimeout(hideOverlay, 3000); }

        // ============================================
        // EVENTI MOUSE / TOUCH / FOCUS
        // ============================================
        document.addEventListener('mousemove', showOverlay);
        player.addEventListener('mouseenter', showOverlay);
        window.addEventListener('blur', showOverlay);
        window.addEventListener('focus', showOverlay);
        document.addEventListener('touchstart', showOverlay, { passive: true });

        // ============================================
        // PLAYER EVENTS (postMessage da vixsrc.to)
        // ============================================
        function extractEvent(d) {
            if (!d || d.type !== 'PLAYER_EVENT') return null;
            if (d.data && d.data.event) return d.data;
            if (d.event && d.event.event) return d.event;
            return null;
        }

        window.addEventListener('message', (event) => {
            const pe = extractEvent(event.data);
            if (!pe) return;
            const ct = parseFloat(pe.currentTime) || 0;
            const dur = parseFloat(pe.duration) || 0;
            if (ct > 0) playerCurrentTime = ct;
            if (dur > 0) playerDuration = dur;

            switch (pe.event) {
                case 'play':
                    isPaused = false;
                    clearTimeout(loadCheckTimer);
                    consecutiveFailures = 0;
                    transitionOverlay.classList.remove('active');
                    startHideTimer();
                    break;
                case 'pause':
                    isPaused = true;
                    clearTimeout(hideTimer);
                    showOverlay();
                    break;
                case 'timeupdate':
                    transitionOverlay.classList.remove('active');
                    if (playerDuration > 0 && playerCurrentTime > 0 && !hasTriggeredNext) {
                        const rem = playerDuration - playerCurrentTime;
                        if (rem <= CREDITS_SKIP_SECONDS) {
                            hasTriggeredNext = true;
                            console.log(`[Gumball] ${rem.toFixed(1)}s rimanenti — skip!`);
                            playNextRandomEpisode();
                        }
                    }
                    break;
            }
        });

        player.addEventListener('load', () => { setTimeout(() => transitionOverlay.classList.remove('active'), 2500); });

        // ============================================
        // BUTTONS
        // ============================================
        btnRandom.addEventListener('click', playRandomEpisode);
        btnHistory.addEventListener('click', goBackToPrevious);

        // ============================================
        // AVVIO
        // ============================================
        initializeApp();
    </script>
</body>
</html>
